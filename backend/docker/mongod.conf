# mongod.conf
storage:
  dbPath: /data/db

net:
  port: 27017
  bindIp: 0.0.0.0

setParameter:
  searchIndexManagementHostAndPort: mongot.mongo-network:27028
  mongotHost: mongot.mongo-network:27028
  skipAuthenticationToSearchIndexManagementServer: false
  useGrpcForSearch: true

replication:
  replSetName: rs0
